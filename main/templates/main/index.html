{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container text-center">
    <div class="row">
        <div class="col-3"></div>

        <!--category-->
        <div class="row">
            <div class="col">

                <!--add carousel-->
                <div class="row">
                    <div id="carouselExample" class="carousel slide">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                                <img src="{% static 'images/first.gif' %}" height="500" class="d-block w-100"
                                     alt="first slide">
                            </div>
                            <div class="carousel-item">
                                <img src="{% static 'images/second.gif' %}" height="500" class="d-block w-100"
                                     alt="second slide">
                            </div>
                            <div class="carousel-item">
                                <img src="{% static 'images/third.jpg' %}" height="500" class="d-block w-100"
                                     alt="third slide">
                            </div>
                        </div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                                data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Previous</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                                data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Next</span>
                        </button>
                    </div>
                </div>

                <!--categories img and title-->
                <div class="row">
                    <div class="col mt-2 text-center">
                        <h1 class="text">Категории товаров</h1>
                    </div>
                </div>
                <div class="row align-items-end">
                    {% for category in categories %}
                    <div class="col-3 mb-5 text-center">
                        <a href="{{ category.get_absolut_url }}"
                           class="link-secondary link-offset-3 link-underline link-underline-opacity-0">
                            <img src="{{ category.image.url }}" style="max-height:150px; min-height: 150px"
                                 class="rounded-circle border" width="200" alt="categoryImg">
                            <h5 class="card-title mt-2">{{ category.name }}</h5>
                        </a>
                    </div>
                    {% endfor %}
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
