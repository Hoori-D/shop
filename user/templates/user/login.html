{% extends "user/base.html" %}

{% load static %}

{% block content %}
<p class="fs-1">Вход</p>
<img src="{% static 'user/images/login-box.jpg' %}" class="login-image mb-2 rounded-circle" alt="login-image">
{% if form.non_field_errors %}
<div class="row justify-content-center">
  <div class="col-6">
    <div class="alert alert-warning" role="alert">
      {{ form.non_field_errors }}
    </div>
  </div>
</div>
{% endif %}
<form method="post" action="{% url 'user:login' %}">
  {% csrf_token %}
  <div class="mb-3">
    <label for="id_username" class="form-label">Логин</label>
    <input type="text" class="form-control" size="40" name="username" id="id_username" placeholder="User" value="{% if form.username.value %}{{ form.username.value }}{% endif %}" autofocus required>
  </div>
  <div class="mb-3">
    <label for="id_password" class="form-label">Пароль</label>
    <input type="password" class="form-control" size="40" name="password" id="id_password" placeholder="********" required>
  </div>


  <div class="form-check mt-2 mb-2 d-flex justify-content-center">
      <input type="checkbox" class="form-check-input me-2" id="remember" checked>
      <label for="remember" class="form-label">Запомнить меня</label>
  </div>

  <button type="submit" class="btn btn-primary">Войти</button>

</form>
{% endblock %}
