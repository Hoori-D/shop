<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Вход</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
  <section>
  <div class="container-fluid vh-100 p-0">

          <div class="row h-100 m-0">
              <div class="col-6 p-0 d-flex flex-column justify-content-center align-items-center text-center">
<!--                  logo-->
                  <a href="#"
                     class="mb-2 position-absolute top-0 start-0 m-0 link-underline link-underline-opacity-0 logo-link d-flex">
                      <img src="img/logo.jpg" class="logo rounded-circle" alt="login-image">
                      <div class="ms-2 mt-2">Алоказица</div>
                  </a>

                  <p class="fs-1">Вход</p>
                  <img src="img/login-box.jpg" class="login-image mb-2 rounded-circle" alt="login-image">
                  <form action="">
                      <label for="email" class="form-label">Почта</label>
                      <div class="input-group mb-3">
                          <input type="email" class="form-control" id="email"
                                 placeholder="example@example.com" aria-describedby="email-addon">
                          <div class="input-group-append">
                            <span class="input-group-text" id="email-addon"><i class="bi bi-envelope"></i></span>
                          </div>
                      </div>

                      <label for="password" class="form-label">Пароль</label>
                      <div class="input-group mb-3">
                          <input type="password" class="form-control" id="password"
                                 placeholder="********" aria-describedby="password-addon">
                          <div class="input-group-append">
                            <span class="input-group-text" id="password-addon"><i class="bi bi-eye-fill"></i></span>
                          </div>
                      </div>

                      <div class="form-check mb-2 d-flex justify-content-center">
                          <input type="checkbox" class="form-check-input me-2" id="remember" checked>
                          <label for="remember" class="form-label">Запомнить меня</label>
                      </div>

                      <button class="btn btn-primary">Войти</button>

                  </form>
                  <p class="mt-4">─── Или войдите с помощью ───</p>
                  <div class="row mb-3">
                      <div class="col">
                          <a href="#" class="mx-1"><img src="img/google-login.png" alt="google-login"
                                                        class="img-fluid google-login border rounded"></a>
                          <a href="#" class="mx-1"><img src="img/vk-login.png" alt="vk-login"
                                                        class="img-fluid vk-login border rounded"></a>
                      </div>
                  </div>
                  <p class="position-absolute bottom-0 start-0 ms-4 mb-4">Еще нет аккаунта?
                      <a href="#" class="link-underline link-underline-opacity-75">Зарегистрироваться</a>
                  </p>
              </div>
              <div class="col-6 p-0">
                  <img src="img/login.jpg" class="img-fluid h-100" alt="login">
              </div>
          </div>
      </div>
  </section>





      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  </body>
</html>
