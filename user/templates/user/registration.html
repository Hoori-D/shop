{% extends 'user/base.html' %}

{% load static %}

{% block content %}
<p class="fs-1">Регистрация</p>
<img src="{% static 'user/images/registration-image.jpg' %}" class="registration-image mb-2 rounded-circle"
     alt="registration-image">
{% if form.non_field_errors %}
<div class="row justify-content-center">
    <div class="col-6">
        <div class="alert alert-warning" role="alert">
            {{ form.non_field_errors }}
        </div>
    </div>
</div>
{% endif %}
<form method="post" action="">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_email" class="form-label">Почта</label>
        <div class="input-group mb-3">
            <input type="email" class="form-control" size="30" name="email" id="id_email" placeholder="email@mail.com"
                   value="{% if form.email.value %}{{ form.email.value }}{% endif %}"
                   aria-describedby="email-addon"
                   autofocus required>
            <div class="input-group-append">
                <span class="input-group-text" id="email-addon"><i class="bi bi-envelope"></i></span>
            </div>
        </div>
    </div>
    <div class="mb-3">
        <label for="id_username" class="form-label">Логин</label>
        <div class="input-group mb-3">
            <input type="text" class="form-control" size="30" name="username" id="id_username"
                   placeholder="User"
                   value="{% if form.username.value %}{{ form.username.value }}{% endif %}"
                   aria-describedby="username-addon"
                   autofocus required>
            <div class="input-group-append">
                <span class="input-group-text" id="username-addon"><i class="bi bi-person-circle"></i></span>
            </div>
        </div>
    </div>
    <div class="mb-3">
        <label for="id_password1" class="form-label">Пароль</label>
        <div class="input-group mb-3">
            <input type="password" class="form-control" size="30" name="password1" id="id_password1"
                   placeholder="User"
                   value="{% if form.password1.value %}{{ form.password1.value }}{% endif %}"
                   aria-describedby="password1-addon"
                   autofocus required>
            <div class="input-group-append">
                <span class="input-group-text" id="password1-addon"><i class="bi bi-eye-slash"></i></span>
            </div>
        </div>
    </div>
    <div class="mb-3">
        <label for="id_password2" class="form-label">Повторите пароль</label>
        <div class="input-group mb-3">
            <input type="password" class="form-control" size="30" name="password2" id="id_password2"
                   placeholder="User"
                   value="{% if form.password2.value %}{{ form.password2.value }}{% endif %}"
                   aria-describedby="password2-addon"
                   autofocus required>
            <div class="input-group-append">
                <span class="input-group-text" id="password2-addon"><i class="bi bi-eye-slash"></i></span>
            </div>
        </div>
    </div>

    <div class="form-check mt-2 mb-2 d-flex justify-content-start">
        <input type="checkbox" class="form-check-input me-2" id="add" checked>
        <label for="add" class="form-label">Получать информацию о наших акциях и новых товарах</label>
    </div>

    <button class="btn btn-primary">Зарегистрироваться</button>

</form>
{% endblock %}
