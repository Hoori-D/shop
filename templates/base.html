{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}{% endblock %}</title>

    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}'">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'favicon/site.webmanifest' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navigation">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url 'main:index' %}">
            <img class="rounded logo-img" src="{% static 'images/logo.jpg' %}" alt="Алоказица">
            <span class="ms-2 logo-link-text">Алоказица</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto">
              <li class="nav-item active me-4" aria-current="page">
                <a href="{% url 'main:index' %}" class="nav-link">Главная</a>
              </li>
              <li class="nav-item active me-4" aria-current="page">
                <a href="{% url 'catalog:index' %}" class="nav-link">Каталог</a>
              </li>
              <li class="nav-item active me-4" aria-current="page">
                <a href="{% url 'main:about' %}" class="nav-link">О нас</a>
              </li>
            </ul>
            <div class="navbar-nav ms-auto me-auto">
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Поиск" aria-label="Search"/>
                    <button class="btn btn-outline-success" type="submit"><i class="bi bi-search"></i></button>
                </form>
            </div>
            {% if request.user.is_authenticated == True %}
            <div class="navbar-nav dropdown ms-auto">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="{% static 'images/login-box.jpg' %}" alt="login" class="login-img rounded-circle">
                </a>
                <ul class="dropdown-menu">
                    <li><a href="{% url 'admin:index' %}" class="dropdown-item">Админка</a></li>
                    <li><a href="#" class="dropdown-item">Профиль</a></li>
                    <li><a href="#" class="dropdown-item">Корзина</a></li>
                    <li>
                        <form action="{% url 'user:logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item">Выйти</button>
                        </form>
                    </li>
                </ul>
            </div>
            {% else %}
            <div class="navbar-nav ms-auto">
                <a href="{% url 'user:login' %}" class="dropdown-item">Войти</a>
                <a href="{% url 'user:registration' %}" class="dropdown-item ms-4">Регистрация</a>
            </div>
            {% endif %}

          </div>
        </div>
      </nav>
    </header>

    <section>{% block content %}{% endblock %}</section>

    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
