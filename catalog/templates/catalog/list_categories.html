<div class="dropdown">
  <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
    Категории
  </button>
  <ul class="dropdown-menu">
    {% for category in categories %}
    <li><div hx-get="{% url 'catalog:category_by_slug' category.slug %}" hx-target="#plants-list" class="dropdown-item">{{category.name}}</div></li>
    {% endfor %}
  </ul>
</div>
