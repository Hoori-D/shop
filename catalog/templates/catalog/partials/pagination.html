{% load catalog_tags %}

<!--pagination-->
{% if page_obj.paginator.num_pages != 1 %}
<div class="row align-items-center justify-content-center">
    <div class="col-12 fixed-bottom">
        <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item {% if not page_obj.has_previous %} disabled {% endif %}">
                <a class="page-link"
                   hx-get="{% if not page_obj.has_previous %}{% else %}?{% change_params page=page_obj.previous_page_number %}{% endif %}"
                   hx-target="#plants-list"
                   hx-push-url="true">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            {% for page in page_obj.paginator.page_range %}
            <li class="page-item {% if page == page_obj.number %} active {% endif %}">
                <a class="page-link"
                   hx-get="?{% change_params page=page %}"
                   hx-target="#plants-list"
                   hx-push-url="true">
                    {{ page }}</a></li>
            {% endfor %}
            <li class="page-item {% if page_obj.has_next == False %} disabled {% endif %}">
                <a class="page-link"
                   hx-get="{% if not page_obj.has_next %}{% else %}?{% change_params page=page_obj.next_page_number %}{% endif %}"
                   hx-target="#plants-list"
                   hx-push-url="true">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
            </ul>
        </nav>
    </div>
</div>
{% endif %}
