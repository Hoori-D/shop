{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col">
        <div class="mb-3">{{ object.username }}</div>
        <div class="row justify-content-center mb-3">
            <div class="col-4">
                <img src="{{ request.user.user_profile.image.url }}" alt="User Avatar" width="200" height="200">
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-4">
               <form method="post" action="{% url 'user_profile:index' request.user.id %}" enctype="multipart/form-data">
                    {% csrf_token %}
                   {{ user_form }}
                   {{ profile_form }}
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </form>
            </div>
        </div>
        {% if messages %}
        <div class="row fixed-bottom justify-content-center">
            <div class="col-4 text-center">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
                    </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>
</div>



{% endblock %}
