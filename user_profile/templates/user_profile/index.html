{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="mb-3">{{ object.username }}</div>
{% if user.profile.image %}
<img src="{{ user.profile.image.url }}" alt="User Avatar" width="50" height="50">
{% else %}
<img src="{% static 'images/login-box.jpg' %}" width="200" height="200" class="img-thumbnail " alt="profile-img">
{% endif %}
{% endblock %}
